<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0057d9" />
  <title>Driver GPS Uploader</title>
  <link rel="stylesheet" href="/driver/styles.css" />
</head>
<body class="page page-driver">
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <header class="hero">
    <div>
      <p class="eyebrow">Driver Operations</p>
      <h1>Driver GPS Uploader</h1>
      <p class="subtitle">Use this page on driver phone to publish live bus location.</p>
    </div>
  </header>

  <main class="layout">
    <section class="list-panel driver-panel surface">
      <div class="panel-title">
        <h2>Driver Console</h2>
        <p>Enter bus, source, destination, and driver PIN</p>
      </div>
      <div class="form-grid">
        <label>Bus
          <input id="bus-id" type="text" placeholder="Enter bus ID" autocomplete="off" autocapitalize="off" />
        </label>
        <label>Source
          <input id="source" type="text" placeholder="Enter source stop" autocomplete="street-address" />
        </label>
        <label>Destination
          <input id="destination" type="text" placeholder="Enter destination stop" autocomplete="street-address" />
        </label>
        <label>Driver PIN
          <input id="driver-pin" type="password" placeholder="Enter PIN" inputmode="numeric" autocomplete="one-time-code" />
        </label>
      </div>

      <div class="controls driver-controls">
        <button id="unlock-btn" type="button">Unlock Driver</button>
        <button id="start-btn" type="button">Start Live Tracking</button>
        <button id="stop-btn" type="button">Stop Tracking</button>
      </div>

      <p id="driver-status" class="status-line" aria-live="polite">Idle.</p>
      <p id="driver-last" class="status-line">No GPS sent yet.</p>
    </section>
  </main>

  <script src="/driver/driver.js"></script>
</body>
</html>
