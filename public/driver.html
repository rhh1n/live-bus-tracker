<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0057d9" />
  <title>Driver GPS Uploader</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Driver GPS Uploader</h1>
    <p>Use this page on driver phone to publish live bus location.</p>
  </header>

  <main class="driver-main">
    <section class="list-panel driver-panel">
      <h2>Bus Details</h2>
      <div class="form-grid">
        <label>Bus ID<input id="bus-id" type="text" value="bus-101" /></label>
        <label>Route No<input id="route-no" type="text" value="101" /></label>
        <label>Destination<input id="destination" type="text" value="Railway Junction" /></label>
        <label>Driver PIN<input id="driver-pin" type="password" placeholder="Enter PIN" /></label>
      </div>

      <div class="controls">
        <button id="unlock-btn" type="button">Unlock Driver</button>
        <button id="start-btn" type="button">Start Live Tracking</button>
        <button id="stop-btn" type="button">Stop</button>
      </div>

      <p id="driver-status">Idle.</p>
      <p id="driver-last">No GPS sent yet.</p>

      <div id="driver-log" class="driver-log"></div>
    </section>
  </main>

  <script src="driver.js"></script>
</body>
</html>
