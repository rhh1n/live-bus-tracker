<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0057d9" />
  <title>Live Bus Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page page-passenger">
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <header class="hero">
    <div>
      <p class="eyebrow">City Mobility</p>
      <h1>Live Bus Tracker</h1>
      <p class="subtitle">See nearby buses and ETA at bus stands in real time.</p>
    </div>
    <nav class="hero-nav" aria-label="App navigation">
      <a href="/" class="nav-chip nav-chip-active">Passenger</a>
      <a href="/driver" class="nav-chip">Driver</a>
    </nav>
  </header>

  <main class="layout passenger-layout">
    <section class="map-panel surface">
      <div class="panel-title">
        <h2>Live Map</h2>
        <p>Real-time buses and your current position</p>
      </div>
      <div id="map"></div>
    </section>

    <section class="list-panel surface">
      <div class="panel-title">
        <h2>Arrivals</h2>
        <p>Closest buses sorted by distance</p>
      </div>
      <div class="controls">
        <button id="locate-btn" type="button">Use my location</button>
        <label class="select-shell">
          <span>Radius</span>
          <select id="radius-select" aria-label="Nearby radius">
            <option value="2">2 km</option>
            <option value="5">5 km</option>
            <option value="10">10 km</option>
            <option value="25">25 km</option>
            <option value="50" selected>50 km</option>
          </select>
        </label>
      </div>
      <p id="location-status" class="status-line" aria-live="polite">Passenger location not set.</p>
      <p id="last-updated" class="status-line">Waiting for updates...</p>
      <div id="arrivals" class="arrivals-list"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
